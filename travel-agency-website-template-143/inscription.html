<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Créer un compte · Camp&Co</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style1.css">
</head>

<body>

<header class="header">
  <div class="container header__container">
    <a href="#" class="brand">Camp&Co</a>
  </div>
</header>

<main class="main">

  <div class="login-wrapper">

    <div class="login-card">

      <div class="login-card__header">
        <i class="fas fa-user-plus login-card__icon"></i>
        <h1>Créer un compte</h1>
        <p>Rejoignez Camp&Co</p>
      </div>

         <form action="inscription.php" method="post" class="login-form">

  <div class="form-group">
    <label>Nom</label>
    <div class="input-group">
      <i class="fas fa-user input-icon"></i>
      <input type="text" name="nom" class="form-control" placeholder="Votre nom" required>
    </div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <div class="input-group">
      <i class="fas fa-envelope input-icon"></i>
      <input type="email" name="email" class="form-control" placeholder="exemple@mail.com" required>
    </div>
  </div>

  <div class="form-group">
    <label>Téléphone</label>
    <div class="input-group">
      <i class="fas fa-phone input-icon"></i>
      <input type="text" name="telephone" class="form-control" placeholder="Téléphone" required>
    </div>
  </div>

  <div class="form-group">
    <label>Mot de passe</label>
    <div class="input-group">
      <i class="fas fa-lock input-icon"></i>
      <input type="password" name="pwd" class="form-control" placeholder="••••••••" required>
    </div>
  </div>

  <button type="submit" name="register" class="btn btn--primary btn--full">
    Créer un compte
  </button>

</form>

      <div class="login-card__footer">
        <p>Déjà un compte ? <a href="#">Se connecter</a></p>
      </div>

    </div>

  </div>

</main>

<footer class="footer">
  <p>&copy; 2025 Camp&Co</p>
</footer>

</body>
</html>
