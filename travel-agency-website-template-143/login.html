<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connexion sécurisée à votre espace client Camp&Co">
  <title>Connexion · Camp&Co</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style1.css">
</head>
<body>

  <!-- Header / Navigation -->
  <header class="header">
    <div class="container header__container">
      <a href="index.html" class="brand">Camp&Co</a>
     
    </div>
  </header>

  <!-- Section principale de connexion -->
  <main class="main">
    <div class="container">
      <div class="login-wrapper">
        <div class="login-card">
          <div class="login-card__header">
            <i class="fas fa-mountain login-card__icon"></i>
            <h1>Connexion</h1>
            <p>Accédez à votre espace personnel</p>
          </div>
          <form action="login.php" method="post" class="login-form">
            <div class="form-group">
              <label for="email">Adresse email</label>
              <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" name="email" class="form-control" placeholder="exemple@domaine.com" required>
              </div>
            </div>
            <div class="form-group">
              <label for="password">Mot de passe</label>
              <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" name="pwd" class="form-control" placeholder="••••••••" required>
              </div>
            </div>
            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox" name="remember"> Se souvenir de moi
              </label>
              <a href="#" class="forgot-link">Mot de passe oublié ?</a>
            </div>
            <button type="submit" name="login" class="btn btn--primary btn--full">Se connecter</button>
          </form>
          <div class="login-card__footer">
            <p>Pas encore de compte ? <a href="inscription.html" class="signup-link">Créer un compte</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer minimal -->
  <footer class="footer">
    <div class="container footer__container">
      <p>&copy; 2025 Camp&Co – Tous droits réservés</p>
    </div>
  </footer>

</body>
</html>
